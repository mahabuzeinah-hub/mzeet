<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; }
body { font-family: Arial; background: #f5f5f5; }
.header { background: #0f766e; color: white; padding: 20px; }
.header h1 { margin: 0; font-size: 24px; }
.header p { font-size: 12px; opacity: 0.9; }
.container { display: flex; height: calc(100vh - 80px); }
.sidebar { width: 100%; background: white; display: flex; flex-direction: column; }
.controls { padding: 15px; border-bottom: 1px solid #ddd; flex-shrink: 0; }
.tree { flex: 1; overflow-y: auto; padding: 15px; }
.btn { width: 100%; padding: 10px; background: #0f766e; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
.btn:hover { background: #0d5a50; }

.item-wrapper { margin: 5px 0; }
.item { padding: 10px; border-radius: 4px; display: flex; align-items: center; gap: 8px; border: 2px solid transparent; }
.item.main { background: linear-gradient(135deg, #e0f7f4, #d4f4f1); border-color: #0f766e; color: #0f766e; font-weight: bold; }
.item.child { background: linear-gradient(135deg, #fef3c7, #fde68a); border-color: #f59e0b; color: #92400e; }
.item:hover { opacity: 0.85; }

.toggle { width: 20px; height: 20px; background: none; border: none; cursor: pointer; font-size: 14px; padding: 0; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.toggle.open { transform: rotate(90deg); }
.space { width: 20px; flex-shrink: 0; }
.icon { font-size: 16px; flex-shrink: 0; }
.title { flex: 1; word-break: break-word; }
.actions { display: flex; gap: 4px; flex-shrink: 0; }
.action { padding: 3px 6px; border: none; border-radius: 3px; cursor: pointer; color: white; font-weight: bold; font-size: 11px; }
.add { background: #14b8a6; }
.edit { background: #ca8a04; }
.delete { background: #dc2626; }
.action:hover { opacity: 0.8; }

.children { margin-left: 20px; }
.children.hidden { display: none !important; }

.empty { color: #999; text-align: center; padding: 20px; }

.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
.modal.show { display: flex; }
.modal-box { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }
.modal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #0f766e; }
.modal-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 15px; font-family: Arial; font-size: 14px; }
.modal-buttons { display: flex; gap: 10px; }
.modal-btn { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
.primary { background: #0f766e; color: white; }
.secondary { background: #e5e5e5; }
.danger { background: #dc2626; color: white; }

.toast { position: fixed; bottom: 20px; right: 20px; background: #16a34a; color: white; padding: 12px 20px; border-radius: 4px; animation: slideUp 0.3s; }
.toast.error { background: #dc2626; }
@keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body>
<div class="header">
<h1>🌳 Tree Explorer</h1>
<p>Blue = Main Items | Yellow = Child Items</p>
</div>

<div class="container">
<div class="sidebar">
<div class="controls">
<button class="btn" onclick="addRoot()">+ Add Main Item</button>
</div>
<div class="tree" id="tree"></div>
</div>
</div>

<div id="inputModal" class="modal">
<div class="modal-box">
<div class="modal-title" id="modalTitle">New Item</div>
<input type="text" class="modal-input" id="modalInput" placeholder="Enter name...">
<div class="modal-buttons">
<button class="modal-btn secondary" onclick="closeInput()">Cancel</button>
<button class="modal-btn primary" onclick="createItem()">Create</button>
</div>
</div>
</div>

<div id="confirmModal" class="modal">
<div class="modal-box">
<div class="modal-title">Delete Item?</div>
<p id="confirmText" style="margin-bottom: 15px; color: #666;"></p>
<div class="modal-buttons">
<button class="modal-btn secondary" onclick="closeConfirm()">Cancel</button>
<button class="modal-btn danger" onclick="confirmDelete()">Delete</button>
</div>
</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('treeData')) || [];
let nextId = parseInt(localStorage.getItem('nextId')) || 1;
let expanded = JSON.parse(localStorage.getItem('expanded')) || {};
let currentParentId = null;
let currentEditId = null;
let currentDeleteId = null;

function save() {
    localStorage.setItem('treeData', JSON.stringify(data));
    localStorage.setItem('nextId', nextId);
    localStorage.setItem('expanded', JSON.stringify(expanded));
}

function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = 'toast' + (type === 'error' ? ' error' : '');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

function addRoot() {
    currentParentId = null;
    currentEditId = null;
    document.getElementById('modalTitle').textContent = 'New Main Item';
    document.getElementById('modalInput').value = '';
    document.getElementById('inputModal').classList.add('show');
    document.getElementById('modalInput').focus();
}

function addChild(id) {
    currentParentId = id;
    currentEditId = null;
    expanded[id] = true;
    document.getElementById('modalTitle').textContent = 'New Child Item';
    document.getElementById('modalInput').value = '';
    document.getElementById('inputModal').classList.add('show');
    document.getElementById('modalInput').focus();
}

function editItem(id) {
    const item = data.find(i => i.id === id);
    currentEditId = id;
    currentParentId = null;
    document.getElementById('modalTitle').textContent = 'Edit Item';
    document.getElementById('modalInput').value = item.title;
    document.getElementById('inputModal').classList.add('show');
    document.getElementById('modalInput').focus();
}

function createItem() {
    const title = document.getElementById('modalInput').value.trim();
    if (!title) { 
        toast('Enter a name', 'error'); 
        return; 
    }

    if (currentEditId) {
        data.find(i => i.id === currentEditId).title = title;
        toast('✓ Updated');
    } else {
        data.push({ id: nextId++, title, parentId: currentParentId });
        toast('✓ Created');
    }
    save();
    render();
    closeInput();
}

function deleteItem(id) {
    const item = data.find(i => i.id === id);
    currentDeleteId = id;
    document.getElementById('confirmText').textContent = 'Delete "' + item.title + '" and all its children?';
    document.getElementById('confirmModal').classList.add('show');
}

function confirmDelete() {
    const del = (id) => {
        data = data.filter(i => {
            if (i.id === id) {
                delete expanded[id];
                return false;
            }
            if (i.parentId === id) del(i.id);
            return true;
        });
    };
    del(currentDeleteId);
    save();
    render();
    toast('✓ Deleted');
    closeConfirm();
}

function closeInput() {
    document.getElementById('inputModal').classList.remove('show');
}

function closeConfirm() {
    document.getElementById('confirmModal').classList.remove('show');
}

function toggleExpand(id) {
    if (expanded[id]) {
        expanded[id] = false;
    } else {
        expanded[id] = true;
    }
    save();
    render();
}

function renderItem(item, level) {
    const children = data.filter(i => i.parentId === item.id);
    const isMain = level === 0;
    const isExpanded = expanded[item.id] === true;
    
    let html = `<div class="item-wrapper">
<div class="item ${isMain ? 'main' : 'child'}">
    ${children.length ? `<button class="toggle ${isExpanded ? 'open' : ''}" onclick="toggleExpand(${item.id})">▶</button>` : `<div class="space"></div>`}
    <span class="icon">${isMain ? '📁' : '📄'}</span>
    <span class="title">${item.title}</span>
    <div class="actions">
        <button class="action add" onclick="addChild(${item.id})" title="Add">+</button>
        <button class="action edit" onclick="editItem(${item.id})" title="Edit">✎</button>
        <button class="action delete" onclick="deleteItem(${item.id})" title="Delete">✕</button>
    </div>
</div>`;

    if (children.length) {
        html += `<div class="children ${isExpanded ? '' : 'hidden'}">`;
        children.forEach(child => {
            html += renderItem(child, level + 1);
        });
        html += `</div>`;
    }
    
    html += `</div>`;
    return html;
}

function render() {
    const root = data.filter(i => !i.parentId);
    if (root.length === 0) {
        document.getElementById('tree').innerHTML = '<div class="empty">No items yet<br>Click + Add Main Item to start</div>';
    } else {
        let html = '';
        root.forEach(item => {
            html += renderItem(item, 0);
        });
        document.getElementById('tree').innerHTML = html;
    }
}

document.getElementById('modalInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') createItem();
});

document.getElementById('inputModal').addEventListener('click', e => {
    if (e.target.id === 'inputModal') closeInput();
});

document.getElementById('confirmModal').addEventListener('click', e => {
    if (e.target.id === 'confirmModal') closeConfirm();
});

render();
</script>
</body>
</html>
