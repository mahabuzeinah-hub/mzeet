<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Explorer</title>
<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }
.header { background: #0f766e; color: white; padding: 20px; }
.header h1 { margin: 0; }
.container { display: flex; height: 90vh; }
.sidebar { width: 350px; background: white; border-right: 1px solid #ddd; overflow-y: auto; padding: 15px; }
.btn { width: 100%; padding: 10px; background: #0f766e; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
.btn:hover { background: #0d5a50; }
.item { margin: 8px 0; padding: 10px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.item.main { background: linear-gradient(135deg, #e0f7f4, #d4f4f1); border: 2px solid #0f766e; color: #0f766e; font-weight: bold; }
.item.child { background: linear-gradient(135deg, #fef3c7, #fde68a); border: 2px solid #f59e0b; color: #92400e; }
.item:hover { opacity: 0.8; }
.toggle { width: 20px; cursor: pointer; background: none; border: none; }
.toggle.open { transform: rotate(90deg); }
.icon { font-size: 16px; }
.title { flex: 1; }
.actions { display: flex; gap: 5px; }
.action { padding: 4px 8px; border: none; border-radius: 3px; cursor: pointer; color: white; font-weight: bold; font-size: 12px; }
.add { background: #14b8a6; }
.edit { background: #ca8a04; }
.delete { background: #dc2626; }
.children { margin-left: 15px; max-height: 9999px; overflow: hidden; transition: max-height 0.3s; }
.children.hidden { max-height: 0; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
.modal.show { display: flex; }
.modal-box { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }
.modal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
.modal-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 15px; font-family: Arial; }
.modal-buttons { display: flex; gap: 10px; }
.modal-btn { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
.primary { background: #0f766e; color: white; }
.secondary { background: #e5e5e5; }
.danger { background: #dc2626; color: white; }
.toast { position: fixed; bottom: 20px; right: 20px; background: #16a34a; color: white; padding: 12px 20px; border-radius: 4px; animation: slideUp 0.3s; }
.toast.error { background: #dc2626; }
@keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body>
<div class="header">
<h1>🌳 Tree Explorer</h1>
<p>Blue = Main | Yellow = Child</p>
</div>

<div class="container">
<div class="sidebar">
<button class="btn" onclick="addRoot()">+ Add Item</button>
<div id="tree"></div>
</div>
</div>

<div id="inputModal" class="modal">
<div class="modal-box">
<div class="modal-title" id="modalTitle">New Item</div>
<input type="text" class="modal-input" id="modalInput" placeholder="Enter name...">
<div class="modal-buttons">
<button class="modal-btn secondary" onclick="closeInput()">Cancel</button>
<button class="modal-btn primary" onclick="createItem()">Create</button>
</div>
</div>
</div>

<div id="confirmModal" class="modal">
<div class="modal-box">
<div class="modal-title">Delete?</div>
<p id="confirmText" style="margin-bottom: 15px;"></p>
<div class="modal-buttons">
<button class="modal-btn secondary" onclick="closeConfirm()">Cancel</button>
<button class="modal-btn danger" onclick="confirmDelete()">Delete</button>
</div>
</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('treeData')) || [];
let nextId = parseInt(localStorage.getItem('nextId')) || 1;
let currentParentId = null;
let currentEditId = null;
let currentDeleteId = null;

function save() {
    localStorage.setItem('treeData', JSON.stringify(data));
    localStorage.setItem('nextId', nextId);
}

function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = 'toast' + (type === 'error' ? ' error' : '');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

function addRoot() {
    currentParentId = null;
    currentEditId = null;
    document.getElementById('modalTitle').textContent = 'New Main Item';
    document.getElementById('modalInput').value = '';
    document.getElementById('inputModal').classList.add('show');
    document.getElementById('modalInput').focus();
}

function addChild(id) {
    currentParentId = id;
    currentEditId = null;
    document.getElementById('modalTitle').textContent = 'New Child Item';
    document.getElementById('modalInput').value = '';
    document.getElementById('inputModal').classList.add('show');
    document.getElementById('modalInput').focus();
}

function editItem(id) {
    const item = data.find(i => i.id === id);
    currentEditId = id;
    currentParentId = null;
    document.getElementById('modalTitle').textContent = 'Edit Item';
    document.getElementById('modalInput').value = item.title;
    document.getElementById('inputModal').classList.add('show');
    document.getElementById('modalInput').focus();
}

function createItem() {
    const title = document.getElementById('modalInput').value.trim();
    if (!title) { toast('Enter name', 'error'); return; }

    if (currentEditId) {
        data.find(i => i.id === currentEditId).title = title;
        toast('✓ Updated');
    } else {
        data.push({ id: nextId++, title, parentId: currentParentId });
        toast('✓ Created');
    }
    save();
    render();
    closeInput();
}

function deleteItem(id) {
    const item = data.find(i => i.id === id);
    currentDeleteId = id;
    document.getElementById('confirmText').textContent = 'Delete "' + item.title + '"?';
    document.getElementById('confirmModal').classList.add('show');
}

function confirmDelete() {
    const del = (id) => {
        data = data.filter(i => {
            if (i.id === id) return false;
            if (i.parentId === id) del(i.id);
            return true;
        });
    };
    del(currentDeleteId);
    save();
    render();
    toast('✓ Deleted');
    closeConfirm();
}

function closeInput() {
    document.getElementById('inputModal').classList.remove('show');
}

function closeConfirm() {
    document.getElementById('confirmModal').classList.remove('show');
}

function toggle(btn, id) {
    btn.classList.toggle('open');
    document.querySelector('[data-parent="' + id + '"]').classList.toggle('hidden');
}

function renderItem(item, level) {
    const children = data.filter(i => i.parentId === item.id);
    const isMain = level === 0;
    
    return `<div style="margin-bottom: 5px;">
    <div class="item ${isMain ? 'main' : 'child'}">
        ${children.length ? '<button class="toggle" onclick="toggle(this, ' + item.id + ')">▶</button>' : '<span style="width: 20px;"></span>'}
        <span class="icon">${isMain ? '📁' : '📄'}</span>
        <span class="title">${item.title}</span>
        <div class="actions">
            <button class="action add" onclick="addChild(' + item.id + ')">+</button>
            <button class="action edit" onclick="editItem(' + item.id + ')">✎</button>
            <button class="action delete" onclick="deleteItem(' + item.id + ')">✕</button>
        </div>
    </div>
    ${children.length ? '<div class="children hidden" data-parent="' + item.id + '">' + children.map(c => renderItem(c, level + 1)).join('') + '</div>' : ''}
    </div>`;
}

function render() {
    const root = data.filter(i => !i.parentId);
    document.getElementById('tree').innerHTML = root.length 
        ? root.map(item => renderItem(item, 0)).join('') 
        : '<div style="color: #999; text-align: center; padding: 20px;">No items</div>';
}

document.getElementById('modalInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') createItem();
});

document.getElementById('inputModal').addEventListener('click', e => {
    if (e.target.id === 'inputModal') closeInput();
});

document.getElementById('confirmModal').addEventListener('click', e => {
    if (e.target.id === 'confirmModal') closeConfirm();
});

render();
</script>
</body>
</html>
